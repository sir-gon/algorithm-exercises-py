---
name: Python CI Test

on: # yamllint disable-line rule:truthy
  push:
    branches: ['main']
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ['main']
  workflow_dispatch:

env:
  LOG_LEVEL: INFO

jobs:
  test:
    name: 'Python CI Test'
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'macos-14', 'windows-2022']
        python: ['3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Python
        uses: actions/setup-python@master
        with:
          python-version: ${{ matrix.python }}

      - name: Install tooling on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pipenv
        shell: bash

      - name: Install tooling on macOS
        if: runner.os == 'macOS'
        run: |
          brew install pipenv
        shell: bash

      - name: Install tooling on Windows
        if: runner.os == 'Windows'
        run: |
          python -m pip install --user pipenv==2026.6.1
        shell: pwsh

      - name: Tooling check
        run: |
          python3 --version
          pipenv --version
          make --version

      - name: Install
        run: |
          # Use the lockfile to install deterministic, audited dependencies
          pipenv sync --dev

      - name: Test
        run: >
          pipenv run coverage run -m pytest --verbose
          -o log_cli=true
          --log-cli-level=INFO
          src/

      - name: Coverage
        run: |
          pipenv run coverage report
